name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux
          # Both OpenCV majors are covered. Pinning only to opencv@4 would let
          # a 5.x incompatibility land unnoticed; testing only 5 would drop the
          # version most distributions still ship. See #56.
          - os: macos-latest
            name: macOS (OpenCV 4)
            opencv: opencv@4
          - os: macos-latest
            name: macOS (OpenCV 5)
            opencv: opencv

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopencv-dev \
            libavformat-dev libavcodec-dev libswscale-dev libavutil-dev \
            pkg-config \
            ffmpeg \
            libx264-dev libx265-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ${{ matrix.opencv }} ffmpeg pkg-config x264 x265
          # opencv@4 is keg-only, so it needs an explicit prefix; the
          # unversioned formula does not, but pointing at it is harmless.
          echo "CMAKE_PREFIX_PATH=$(brew --prefix ${{ matrix.opencv }})" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python build dependencies
        run: pip install pybind11 numpy pytest

      - name: Configure
        run: |
          set -o pipefail
          cmake -B build \
            -DFRAMEWRIGHT_BUILD_TESTS=ON \
            -DFRAMEWRIGHT_BUILD_EXAMPLES=ON \
            -DFRAMEWRIGHT_BUILD_PYTHON=ON \
            -Dpybind11_DIR=$(python3 -c "import pybind11; print(pybind11.get_cmake_dir())") \
            -DCMAKE_BUILD_TYPE=Release 2>&1 | tee configure.log

      # Every test fixture is generated by ffmpeg at configure time, and the
      # test cases that use them are #ifdef-guarded. A fixture that fails to
      # generate therefore removes tests from the suite without failing
      # anything -- the same shape of silent gap as #55, where CI ran zero
      # tests and stayed green. All dependencies are installed above, so on CI
      # a disabled fixture is a real problem, not a graceful degradation.
      - name: Require all fixtures
        run: |
          if grep -q "fixture: DISABLED" configure.log; then
            grep "fixture: DISABLED" configure.log
            echo "::error::a test fixture failed to generate; the suite would silently shrink"
            exit 1
          fi
          grep "fixture: enabled" configure.log

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      # Requiring the fixtures (above) catches a fixture that fails to
      # generate, but not a test case deleted outright or gated on something
      # other than a fixture. These are the cases covering bugs that reached
      # main and were expensive to find -- name them so their disappearance is
      # an error rather than a silently smaller suite. A total-count assertion
      # was considered instead and rejected: it needs bumping on every test
      # addition, which trains people to update it reflexively, and it reports
      # "the number changed" rather than which coverage was lost. See #58.
      - name: Require critical test cases
        run: |
          listing=$(build/framewright_tests --list-tests)
          missing=0
          checked=0
          while IFS= read -r name; do
            # The heredoc below is indented to satisfy YAML; strip that back
            # off or nothing will ever match and this check passes vacuously.
            name="${name#"${name%%[![:space:]]*}"}"
            [ -z "$name" ] && continue
            if grep -qF "$name" <<<"$listing"; then
              # Report matches, not just failures: a silent pass is
              # indistinguishable from a check that matched nothing.
              echo "ok: $name"
              checked=$((checked + 1))
            else
              echo "::error::missing test case: $name"
              missing=1
            fi
          done <<'CASES'
          VideoReader seek lands on the frame it reports
          VideoReader seek lands on the frame it reports (B-frames)
          VideoReader reads every frame through to EOF
          VideoReader seek leaves the position counter consistent
          VideoReader seek past the end fails
          CASES

          echo "verified $checked critical test cases"
          if [ "$checked" -eq 0 ]; then
            echo "::error::no test names were checked; this guard is not working"
            exit 1
          fi
          exit $missing

      - name: Test (C++)
        run: ctest --test-dir build --output-on-failure --no-tests=error

      # ctest reports pass/fail for the binary as a whole, and
      # --output-on-failure hides Catch2's summary on success -- so a green
      # build records nothing about how many cases actually ran. A case that
      # starts skipping stays present in --list-tests (so #65 does not catch
      # it) and needs no fixture (so #63 does not either), yet exercises
      # nothing. Every codec these tests need is installed above, so on CI a
      # skip is a real gap rather than graceful degradation. See #66.
      - name: Report and check test counts
        run: |
          set -o pipefail
          # Default console reporter, not --reporter compact: compact omits the
          # skip count entirely, so the check below would never see one.
          build/framewright_tests | tail -5 | tee catch2.log
          if grep -qiE "[1-9][0-9]* skipped" catch2.log; then
            echo "::error::test cases were skipped; CI should run the whole suite"
            exit 1
          fi

      - name: Test (Python)
        run: |
          export PYTHONPATH="$PWD/build:$PWD/python"
          export TEST_FIXTURES_DIR="$PWD/build/test_fixtures"
          pytest python/tests/ -v
