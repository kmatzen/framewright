name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux
          - os: macos-latest
            name: macOS

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libopencv-dev \
            libavformat-dev libavcodec-dev libswscale-dev libavutil-dev \
            pkg-config \
            ffmpeg \
            libx264-dev libx265-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install opencv@4 ffmpeg pkg-config x264 x265
          # Homebrew's `opencv` formula is now 5.x, which CMakeLists.txt does
          # not accept (see #56). Pin to the 4.x formula, which is keg-only and
          # so needs an explicit prefix.
          echo "CMAKE_PREFIX_PATH=$(brew --prefix opencv@4)" >> "$GITHUB_ENV"

      - name: Configure
        run: |
          cmake -B build \
            -DFRAMEWRIGHT_BUILD_TESTS=ON \
            -DFRAMEWRIGHT_BUILD_EXAMPLES=ON \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.ncpu)

      - name: Test
        run: ctest --test-dir build --output-on-failure --no-tests=error
