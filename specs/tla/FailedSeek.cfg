\* Baseline: keyframes at 0 and 6, timestamps usable.
\* SeekThreshold is 3 rather than the C++'s 50 so that a 12-frame model still
\* exercises the large-forward-jump branch; the branch condition is what
\* matters, not the constant.

SPECIFICATION Spec

CONSTANTS
    NumFrames     = 12
    Keyframes     = {0, 6}
    SeekThreshold = 3
    PtsAvailable  = TRUE

INVARIANTS
    TypeOK
    FailedSeekIsHonest
